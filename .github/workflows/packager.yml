name: Auto NIC packager
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $USER /opt/theos
          brew install ldid
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          sudo rm -rf /opt/theos/sdks
          git clone https://github.com/theos/sdks.git /opt/theos/sdks

      - name: Build Package
        run: |
          cd template
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RespawPurple-Package
          path: template/packages/*.deb
